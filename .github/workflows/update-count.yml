name: Update LeetCode Count
permissions:
  contents: write
on:
  push:
    branches:
      - main

jobs:
  count:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Count problems
        run: |
          COUNT=$(find . -maxdepth 1 -type d -regex './[0-9].*' | wc -l)
          sed -i "s/<!-- SOLVED_COUNT -->.*<!-- SOLVED_COUNT -->/<!-- SOLVED_COUNT -->$COUNT<!-- SOLVED_COUNT -->/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md
          git diff --staged --quiet || git commit -m "Update solved count"
          git push
